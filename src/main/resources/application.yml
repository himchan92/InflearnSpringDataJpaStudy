spring:
        datasource:
                url: jdbc:h2:tcp://localhost/~/datajpa
                username: sa
                password:
                driver-class-name: org.h2.Driver

        jpa:
                hibernate:
                        ddl-auto: create
                properties:
                        hibernate:
                                format_sql: true # 로그에 sql 정리에서 조회

logging:
        level:
          org.hibernate.sql: debug # sql 로그 남기기